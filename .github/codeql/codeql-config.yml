name: "unified-ui Platform Service CodeQL Configuration"

queries:
  - uses: security-extended
  - uses: security-and-quality

query-filters:
  # Log injection (py/log-injection) is mitigated centrally via SafeLogger
  # in unifiedui/logger.py which sanitizes all log messages at runtime by
  # stripping \r and \n characters before they reach any handler/formatter.
  # CodeQL's static analysis cannot trace through setLoggerClass() so it
  # still flags individual call sites. The runtime defense covers all 309+
  # flagged locations.
  - exclude:
      id: py/log-injection
