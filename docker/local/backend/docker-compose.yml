name: unifiedui-backend

services:
  unifiedui-backend:
    build:
      context: ../../..
      dockerfile: docker/local/backend/Dockerfile
    container_name: unifiedui-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Mount source code for hot reload
      - ../../../unifiedui:/app/unifiedui:ro
      - ../../../alembic:/app/alembic:ro
      - ../../../alembic.ini:/app/alembic.ini:ro
      # Mount uv files for dependency updates
      - ../../../pyproject.toml:/app/pyproject.toml:ro
      - ../../../uv.lock:/app/uv.lock:ro
    environment:
      # PostgreSQL Configuration
      - DATABASE_URL=postgresql://unifiedui:unifiedui_password@unifiedui-database:5432/unifiedui
      - DB_HOST=unifiedui-database
      - DB_PORT=5432
      - DB_NAME=unifiedui
      - DB_USER=unifiedui
      - DB_PASSWORD=unifiedui_password
      
      # MongoDB Configuration
      - DOCUMENT_DATABASE=mongodb
      - MONGODB_CONNECTION_STRING=mongodb://admin:admin@unifiedui-docdatabase:27017/?authSource=admin
      - MONGODB_DATABASE_NAME=unifiedui
      
      # Redis Cache Configuration
      - CACHE_ENABLED=true
      - CACHE_BACKEND=redis
      - REDIS_HOST=unifiedui-cache
      - REDIS_PORT=6379
      - REDIS_DB=0
      - REDIS_PASSWORD=admin
      
      # RabbitMQ Configuration
      - RABBITMQ_HOST=unifiedui-message-broker
      - RABBITMQ_PORT=5672
      - RABBITMQ_MANAGEMENT_PORT=15672
      - RABBITMQ_USER=admin
      - RABBITMQ_PASSWORD=admin
      
      # HashiCorp Vault Configuration
      - VAULT_TYPE=HASHICORP_VAULT
      - VAULT_ADDR=http://unifiedui-vault:8200
      - VAULT_TOKEN=admin
      
      # Secret Encryption Key (for caching secrets)
      - SECRETS_ENCRYPTION_KEY=local-dev-encryption-key-32chars!
      
      # Logging
      - LOG_LEVEL=DEBUG
      
      # CORS (allow frontend)
      # - CORS_ORIGINS=["http://localhost:5173","http://localhost:3000","http://localhost:8000"]
    networks:
      - unifiedui_network
    depends_on:
      unifiedui-database:
        condition: service_healthy
      unifiedui-docdatabase:
        condition: service_started
      unifiedui-cache:
        condition: service_started
      unifiedui-vault:
        condition: service_started
      unifiedui-message-broker:
        condition: service_started

networks:
  unifiedui_network:
    name: unifiedui_network
    driver: bridge
