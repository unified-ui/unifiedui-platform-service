name: unifiedui-infra

services:
  unifiedui-database:
    image: postgres:16-alpine
    container_name: unifiedui-database
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=unifiedui
      - POSTGRES_PASSWORD=unifiedui_password
      - POSTGRES_DB=unifiedui
    volumes:
      - postgres_data_unifiedui:/var/lib/postgresql/data
    networks:
      - unifiedui_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unifiedui"]
      interval: 10s
      timeout: 5s
      retries: 5

  unifiedui-docdatabase:
    image: mongo:8.2
    container_name: unifiedui-docdatabase
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
    volumes:
      - mongo_data:/data/db
    networks:
      - unifiedui_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  unifiedui-cache:
    image: redis:8.4
    container_name: unifiedui-cache
    environment:
      REDIS_PASSWORD: admin
    command: ["redis-server", "--requirepass", "admin"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - unifiedui_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "admin", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  unifiedui-message-broker:
    image: rabbitmq:4.2-management
    container_name: unifiedui-message-broker
    ports:
      - "5672:5672"   # AMQP protocol
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - unifiedui_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  unifiedui-vault:
    image: hashicorp/vault:1.18
    container_name: unifiedui-vault
    ports:
      - "8200:8200"
    environment:
      # Dev-mode with persistent file storage
      VAULT_DEV_ROOT_TOKEN_ID: admin
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_LOCAL_CONFIG: |
        storage "file" {
          path = "/vault/file"
        }
        listener "tcp" {
          address = "0.0.0.0:8200"
          tls_disable = true
        }
        disable_mlock = true
        ui = true
    cap_add:
      - IPC_LOCK
    # Dev mode with file backend for persistence
    command: vault server -dev -dev-root-token-id=admin
    volumes:
      - vault_data:/vault/file
    networks:
      - unifiedui_network
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  
volumes:
  vault_data:
  mongo_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  postgres_data_unifiedui:

networks:
  unifiedui_network:
    name: unifiedui_network
    driver: bridge
