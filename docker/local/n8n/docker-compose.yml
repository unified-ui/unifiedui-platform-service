name: unifiedui-n8n

services:
  n8n-database:
    image: postgres:16-alpine
    container_name: n8n-database
    restart: unless-stopped
    environment:
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=n8n_password
      - POSTGRES_DB=n8n
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - unifiedui_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - GENERIC_TIMEZONE=Europe/Berlin
      - TZ=Europe/Berlin
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=n8n-database
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8n_password
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - unifiedui_network
    depends_on:
      n8n-database:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: n8n-nginx-proxy
    restart: unless-stopped
    ports:
      - "5679:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - unifiedui_network
    depends_on:
      - n8n

volumes:
  n8n_data:
    driver: local
  postgres_data:
    driver: local

networks:
  unifiedui_network:
    name: unifiedui_network
    driver: bridge
